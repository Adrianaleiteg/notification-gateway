spring.application.name=gateway
server.port=8080
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Initial admin seed — created on startup only if no admin exists yet.
# Required to bootstrap admin-only user creation.
admin.email=${ADMIN_EMAIL:}
admin.password=${ADMIN_PASSWORD:}
admin.name=${ADMIN_NAME:Admin}

# Email provider selection: smtp (default) | resend | brevo
email.provider=${EMAIL_PROVIDER:smtp}

# Resend (HTTPS API) — used when EMAIL_PROVIDER=resend.
# MAIL_FROM must be an address on a domain verified in your Resend account
# (use onboarding@resend.dev only for testing to your own account email).
resend.api-key=${RESEND_API_KEY:}
resend.from=${MAIL_FROM:onboarding@resend.dev}

# Brevo (HTTPS API) — used when EMAIL_PROVIDER=brevo.
# MAIL_FROM can be a single sender e-mail (e.g. a Gmail address) verified in
# Brevo — no domain required. Accepts "email@x.com" or "Name <email@x.com>".
brevo.api-key=${BREVO_API_KEY:}
brevo.from=${MAIL_FROM:}
brevo.sender-name=${MAIL_FROM_NAME:Hermes}

# Email SMTP — used when EMAIL_PROVIDER=smtp. Note: cloud hosts (Railway)
# block outbound SMTP ports, so prefer EMAIL_PROVIDER=resend in production.
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.auth=true
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Senha dev
spring.security.user.name=admin
spring.security.user.password=admin123
